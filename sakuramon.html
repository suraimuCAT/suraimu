<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>さくらもん ボイスデモ</title>
    <style>
        body { 
            background: #fff5f7; 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .main-card {
            display: flex; background: white; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255,182,193,0.3);
            width: 95%; max-width: 900px; overflow: hidden; border: 4px solid #ffc0cb;
        }
        .image-side {
            flex: 1; background: #ffeef4; display: flex;
            align-items: center; justify-content: center; padding: 20px;
            border-right: 2px dashed #ffc0cb;
        }
        .chara-img {
            max-width: 100%; max-height: 500px; border-radius: 15px;
            object-fit: contain; cursor: zoom-in;
        }
        .voice-side { flex: 1.2; padding: 40px; text-align: left; }
        
        h1 { color: #ff69b4; font-size: 24px; margin: 20px 0 10px 0; border-bottom: 2px solid #ffc0cb; display: inline-block; }
        h1:first-child { margin-top: 0; }
        .subtitle { color: #ffb6c1; font-weight: bold; margin-bottom: 20px; display: block; }

        .voice-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 30px; }
        .voice-card { 
            background: #fffafa; border: 2px solid #ffecf2; border-radius: 12px; 
            padding: 15px; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center;
        }
        .voice-card:hover { background: #fff0f5; border-color: #ff69b4; transform: translateX(5px); }

        .label { font-size: 10px; color: #ff69b4; font-weight: bold; display: block; }
        .quote { font-size: 14px; color: #444; font-weight: 500; }
        .playing { border-color: #ff1493 !important; background: #ffe4e1 !important; }

        .description { font-size: 15px; color: #555; line-height: 1.6; background: #fffafb; padding: 15px; border-radius: 10px; }
        .setting-img { width: 100%; border: 1px solid #ffc0cb; border-radius: 10px; margin-top: 10px; }

        @media (max-width: 768px) {
            .main-card { flex-direction: column; }
            .image-side { border-right: none; border-bottom: 2px dashed #ffc0cb; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="image-side">
        <img src="sakuramon.png" alt="さくらもん" class="chara-img" onclick="window.open(this.src)" onerror="this.src='https://placeholder.com'">
    </div>

    <div class="voice-side">
        <h1>🌸 さくらもん</h1>
        <span class="subtitle">VOICE SAMPLES</span>

        <div class="voice-grid">
            <div class="voice-card" onclick="playVoice(this, 'sakuramon_01.wav')">
                <div class="text-content">
                    <span class="label">GREETING</span>
                    <span class="quote">「こんにちは、さくらもんなのだ！」</span>
                </div>
            </div>
            <div class="voice-card" onclick="playVoice(this, 'sakuramon_02.wav')">
                <div class="text-content">
                    <span class="label">DODGE</span>
                    <span class="quote">「警察じゃないのだ！ただのさくらもんなのだ！」</span>
                </div>
            </div>
            <div class="voice-card" onclick="playVoice(this, 'sakuramon_03.wav')">
                <div class="text-content">
                    <span class="label">HAPPY</span>
                    <span class="quote">「今日も満開、絶好調なのだ！」</span>
                </div>
            </div>
        </div>

        <h1>説明！</h1>
        <div class="description">
            わたくしは桜餅の妖精のさくらもんなのだ！<br>
            さくらもんが好きなのは桜餅とみんなの笑顔なのだ！
        </div>

        <h1>VOICEVOX設定</h1>
        <p style="font-size: 12px; color: #888;">この設定で作れます。画像クリックで拡大！</p>
        <img src="スクリーンショット 2026-05-04 162614.png" alt="設定画像" class="setting-img chara-img" onclick="window.open(this.src)" onerror="this.src='https://placeholder.com'">
　　　　<h1>VOICEVOXをゲットするのだ！</h1>
<p style="font-size: 14px; color: #666;">
    わたくしと同じ声を作りたい人は、ここからダウンロードできるのだ！<br>
    👉 <a href="https://voicevox.hiroshiba.jp/">VOICEVOX 公式サイト</a>
</p>

    </div>
</div>

<script>
    let currentAudio = null;
    function playVoice(element, filename) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            document.querySelectorAll('.voice-card').forEach(c => c.classList.remove('playing'));
        }
        const audio = new Audio(filename);
        audio.volume = 1.0; 
        audio.play().catch(e => {
            alert("ファイル「" + filename + "」が見つからないのだ！");
        });
        currentAudio = audio;
        element.classList.add('playing');
        audio.onended = () => element.classList.remove('playing');
    }
</script>

</body>
</html>
